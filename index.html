<!DOCTYPE html>
<html>
<head>
<style>
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: #000;
  }
  #viewport {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    position: relative;
    touch-action: none;
  }
  #photo {
    position: absolute;
    top: 0;
    left: 0;
    max-width: none;
    user-select: none;
    -webkit-user-drag: none;
    cursor: grab;
  }
  #photo:active {
    cursor: grabbing;
  }
</style>
</head>
<body>

<div id="viewport">
  <img id="photo" src="photo.jpg" alt="">
</div>

<script>
  const viewport = document.getElementById('viewport');
  const photo = document.getElementById('photo');

  // НАСТРОЙКА: чем больше это число, тем сильнее картинка "приближена"
  // и тем меньшая её часть видна при открытии страницы
  const INITIAL_ZOOM = 0.2;

  let scale = 1;
  let posX = 0;
  let posY = 0;

  let isDragging = false;
  let startX = 0;
  let startY = 0;

  photo.onload = () => {
    const vw = viewport.clientWidth;
    const vh = viewport.clientHeight;
    const iw = photo.naturalWidth;
    const ih = photo.naturalHeight;

    // минимальный масштаб, при котором картинка покрывает весь экран,
    // умноженный на INITIAL_ZOOM — чтобы изначально была видна лишь часть
    const coverScale = Math.max(vw / iw, vh / ih);
    scale = coverScale * INITIAL_ZOOM;

    // открываем не по центру, а смещённо — например, в верхний левый угол картинки,
    // чтобы сразу было ощущение "виден лишь фрагмент"
    posX = 0;
    posY = 0;

    clampPosition();
    updateTransform();
  };

  function updateTransform() {
    photo.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    photo.style.transformOrigin = '0 0';
  }

  function clampPosition() {
    const vw = viewport.clientWidth;
    const vh = viewport.clientHeight;
    const scaledW = photo.naturalWidth * scale;
    const scaledH = photo.naturalHeight * scale;

    const minX = vw - scaledW;
    const minY = vh - scaledH;

    posX = Math.min(0, Math.max(minX, posX));
    posY = Math.min(0, Math.max(minY, posY));
  }

  // --- перетаскивание мышью ---
  viewport.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.clientX - posX;
    startY = e.clientY - posY;
  });

  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    posX = e.clientX - startX;
    posY = e.clientY - startY;
    clampPosition();
    updateTransform();
  });

  window.addEventListener('mouseup', () => {
    isDragging = false;
  });

  // --- перетаскивание пальцем ---
  viewport.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      isDragging = true;
      startX = e.touches[0].clientX - posX;
      startY = e.touches[0].clientY - posY;
    }
  }, { passive: true });

  viewport.addEventListener('touchmove', (e) => {
    if (!isDragging || e.touches.length !== 1) return;
    posX = e.touches[0].clientX - startX;
    posY = e.touches[0].clientY - startY;
    clampPosition();
    updateTransform();
  }, { passive: true });

  viewport.addEventListener('touchend', () => {
    isDragging = false;
  });

  // --- зум колесом мыши (опционально) ---
  viewport.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY < 0 ? 1.1 : 0.9;
    const oldScale = scale;
    scale *= delta;

    const rect = viewport.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    posX = mx - (mx - posX) * (scale / oldScale);
    posY = my - (my - posY) * (scale / oldScale);

    clampPosition();
    updateTransform();
  }, { passive: false });
</script>

</body>
</html>
