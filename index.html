<!DOCTYPE html>
<html>
<head>
<style>
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: #000;
  }
  #viewport {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    position: relative;
    touch-action: none; /* отключаем стандартный скролл/зум браузера на тач-устройствах */
  }
  #photo {
    position: absolute;
    top: 0;
    left: 0;
    /* картинка показывается в своём естественном размере, без растягивания */
    max-width: none;
    user-select: none;
    -webkit-user-drag: none;
    cursor: grab;
  }
  #photo:active {
    cursor: grabbing;
  }
</style>
</head>
<body>

<div id="viewport">
  <img id="photo" src="photo.jpg" alt="">
</div>

<script>
  const viewport = document.getElementById('viewport');
  const photo = document.getElementById('photo');

  let scale = 1;
  let posX = 0;
  let posY = 0;

  let isDragging = false;
  let startX = 0;
  let startY = 0;

  // когда картинка загрузилась — подгоняем масштаб, чтобы она была не меньше экрана
  photo.onload = () => {
    const vw = viewport.clientWidth;
    const vh = viewport.clientHeight;
    const iw = photo.naturalWidth;
    const ih = photo.naturalHeight;
    // минимальный масштаб, при котором картинка полностью закрывает экран
    scale = Math.max(vw / iw, vh / ih) * 1.3; // *1.3 — начальное приближение, можно убрать
    posX = (vw - iw * scale) / 2;
    posY = (vh - ih * scale) / 2;
    updateTransform();
  };

  function updateTransform() {
    photo.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    photo.style.transformOrigin = '0 0';
  }

  function clampPosition() {
    const vw = viewport.clientWidth;
    const vh = viewport.clientHeight;
    const scaledW = photo.naturalWidth * scale;
    const scaledH = photo.naturalHeight * scale;

    // не даём картинке "уехать" так, чтобы появились пустые поля
    const minX = vw - scaledW;
    const minY = vh - scaledH;

    posX = Math.min(0, Math.max(minX, posX));
    posY = Math.min(0, Math.max(minY, posY));
  }

  // --- перетаскивание мышью ---
  viewport.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.clientX - posX;
    startY = e.clientY - posY;
  });

  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    posX = e.clientX - startX;
    posY = e.clientY - startY;
    clampPosition();
    updateTransform();
  });

  window.addEventListener('mouseup', () => {
    isDragging = false;
  });

  // --- перетаскивание пальцем (тач) ---
  viewport.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      isDragging = true;
      startX = e.touches[0].clientX - posX;
      startY = e.touches[0].clientY - posY;
    }
  }, { passive: true });

  viewport.addEventListener('touchmove', (e) => {
    if (!isDragging || e.touches.length !== 1) return;
    posX = e.touches[0].clientX - startX;
    posY = e.touches[0].clientY - startY;
    clampPosition();
    updateTransform();
  }, { passive: true });

  viewport.addEventListener('touchend', () => {
    isDragging = false;
  });

  // --- зум колесом мыши (опционально) ---
  viewport.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY < 0 ? 1.1 : 0.9;
    const oldScale = scale;
    scale *= delta;

    // зум относительно позиции курсора, чтобы не "прыгало"
    const rect = viewport.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    posX = mx - (mx - posX) * (scale / oldScale);
    posY = my - (my - posY) * (scale / oldScale);

    clampPosition();
    updateTransform();
  }, { passive: false });
</script>

</body>
</html>
