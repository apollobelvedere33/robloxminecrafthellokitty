<!DOCTYPE html>
<html>
<head>
<style>
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: #000;
  }

  #viewport {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    position: relative;
    touch-action: none;
  }

  /*
    Это ключевая часть: max-width/max-height гарантируют,
    что картинка ВСЕГДА вписывается в экран целиком, без обрезки,
    с сохранением пропорций — и это делает браузер сам,
    без единой строчки JavaScript. Поэтому даже если весь скрипт
    ниже не сработает, картинка всё равно отобразится правильно.
  */
  #photo {
    position: absolute;
    top: 50%;
    left: 50%;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    transform: translate(-50%, -50%);
    user-select: none;
    -webkit-user-drag: none;
    cursor: grab;
  }
  #photo:active {
    cursor: grabbing;
  }
</style>
</head>
<body>

<div id="viewport">
  <img id="photo" src="photo.jpg" alt="">
</div>

<script>
  const viewport = document.getElementById('viewport');
  const photo = document.getElementById('photo');

  const MIN_ZOOM = 1;   // 1 = ровно вписанная целиком картинка, меньше нельзя
  const MAX_ZOOM = 4;   // насколько можно приблизить максимум

  let zoom = 1;
  let panX = 0;
  let panY = 0;

  let isDragging = false;
  let dragStartX = 0;
  let dragStartY = 0;

  let pinchStartDist = null;
  let pinchStartZoom = 1;

  // вычисляем реальный отображаемый размер картинки на экране
  // при текущем уровне зума (нужно только для ограничения панорамирования)
  function renderedSize() {
    const vw = viewport.clientWidth;
    const vh = viewport.clientHeight;
    const iw = photo.naturalWidth || vw;
    const ih = photo.naturalHeight || vh;
    const baseScale = Math.min(vw / iw, vh / ih); // та же логика, что и в CSS max-width/max-height
    return {
      w: iw * baseScale * zoom,
      h: ih * baseScale * zoom
    };
  }

  function clampPan() {
    const vw = viewport.clientWidth;
    const vh = viewport.clientHeight;
    const { w, h } = renderedSize();

    const maxPanX = Math.max(0, (w - vw) / 2);
    const maxPanY = Math.max(0, (h - vh) / 2);

    panX = Math.min(maxPanX, Math.max(-maxPanX, panX));
    panY = Math.min(maxPanY, Math.max(-maxPanY, panY));
  }

  function updateTransform() {
    photo.style.transform =
      `translate(calc(-50% + ${panX}px), calc(-50% + ${panY}px)) scale(${zoom})`;
  }

  function setZoom(newZoom) {
    zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, newZoom));
    clampPan();
    updateTransform();
  }

  // --- мышь: перетаскивание ---
  viewport.addEventListener('mousedown', (e) => {
    isDragging = true;
    dragStartX = e.clientX - panX;
    dragStartY = e.clientY - panY;
  });

  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    panX = e.clientX - dragStartX;
    panY = e.clientY - dragStartY;
    clampPan();
    updateTransform();
  });

  window.addEventListener('mouseup', () => {
    isDragging = false;
  });

  // --- мышь: зум колесом (от центра картинки) ---
  viewport.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY < 0 ? 1.1 : 0.9;
    setZoom(zoom * delta);
  }, { passive: false });

  // --- тач: одним пальцем перетаскивание, двумя — зум ---
  viewport.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      isDragging = true;
      dragStartX = e.touches[0].clientX - panX;
      dragStartY = e.touches[0].clientY - panY;
    } else if (e.touches.length === 2) {
      isDragging = false;
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      pinchStartDist = Math.hypot(dx, dy);
      pinchStartZoom = zoom;
    }
  }, { passive: true });

  viewport.addEventListener('touchmove', (e) => {
    if (e.touches.length === 1 && isDragging) {
      panX = e.touches[0].clientX - dragStartX;
      panY = e.touches[0].clientY - dragStartY;
      clampPan();
      updateTransform();
    } else if (e.touches.length === 2 && pinchStartDist !== null) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.hypot(dx, dy);
      setZoom(pinchStartZoom * (dist / pinchStartDist));
    }
  }, { passive: true });

  viewport.addEventListener('touchend', (e) => {
    isDragging = false;
    if (e.touches.length < 2) {
      pinchStartDist = null;
    }
  });

  // на изменение размера окна / поворот телефона достаточно
  // просто пересчитать границы панорамирования — сама подгонка
  // картинки под экран уже сделана через CSS и не требует пересчёта
  window.addEventListener('resize', () => {
    clampPan();
    updateTransform();
  });
</script>

</body>
</html>
