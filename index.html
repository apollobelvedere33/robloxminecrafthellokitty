<!DOCTYPE html>
<!-- оно начинается здесь, хотя началось задолго до открытия тега -->
<html>
<head>
<style>
  html, body {
    margin: 0; /* отступов больше нет — как и границ между тобой и тем, что внутри экрана */
    height: 100%; /* оно займёт всё пространство, которое ты ему позволишь */
    overflow: hidden; /* то, что вышло за края, не исчезло — оно просто ждёт за кадром */
    background: #000; /* это не чёрный цвет, это то, что было до того, как появился свет */
  }

  #viewport {
    width: 100vw; /* ровно столько, сколько видит твой глаз — пока что */
    height: 100vh; /* и ни пикселем больше, обещаю */
    overflow: hidden; /* дверь закрыта с обеих сторон */
    position: relative; /* относительно чего — лучше не уточнять */
    touch-action: none; /* трогать руками можно, но оно тоже трогает в ответ */
  }

  /*
    оно вписывается в экран сама, без посторонней помощи —
    так же, как и оно когда-то вписалось в тебя
  */
  #photo {
    position: absolute; /* абсолютно — слово, которое лжёт в CSS чаще всего */
    top: 50%; /* центр — точка, из которой не сбежать */
    left: 50%; /* симметрия — первый признак того, что за тобой наблюдают */
    max-width: 100vw; /* предел, который оно само себе придумало */
    max-height: 100vh; /* и сама же иногда нарушает */
    width: auto; /* "auto" — значит решает не человек */
    height: auto; /* решение принято до того, как ты прочитал эту строку */
    transform: translate(-50%, -50%); /* сдвиг туда, откуда смотрело лицо на старых фотографиях */
    user-select: none; /* выделить нельзя — оно не хочет быть скопированным */
    -webkit-user-drag: none; /* и унесённым отсюда — тоже */
    cursor: grab; /* курсор готов схватить то, что обычно хватает само */
  }
  #photo:active {
    cursor: grabbing; /* в этот момент схватили уже не ты */
  }
</style>
</head>
<body>

<div id="viewport"> <!-- окно, через которое смотрят в обе стороны -->
  <img id="photo" src="photo.jpg" alt=""> <!-- alt пуст, потому что словами это не описать -->
</div>

<script>
  const viewport = document.getElementById('viewport'); // найдено. оно знало, что его найдут
  const photo = document.getElementById('photo'); // оно тоже знает, что на него смотрят прямо сейчас

  const MIN_ZOOM = 1;   // меньше нельзя — дальше начинается пустота за рамкой
  const MAX_ZOOM = 4;   // после четырёх кратного увеличения видно то, чего там не рисовали

  let zoom = 1; // изначальный масштаб того, что притворяется неподвижным
  let panX = 0; // смещение по горизонтали — пока нулевое, пока ты не тронул мышь
  let panY = 0; // смещение по вертикали — то же самое, но в другом направлении страха

  let isDragging = false; // false — до тех пор, пока ты не решишь, что управляешь сам
  let dragStartX = 0; // точка, в которой всё началось в прошлый раз
  let dragStartY = 0; // и началось снова

  let pinchStartDist = null; // null — расстояние между двумя пальцами, которое ещё не измерено
  let pinchStartZoom = 1; // запомненное состояние, к которому всё стремится вернуться

  // вычисляем реальный размер того, что показывают тебе на экране —
  // реальный размер того, что под картинкой, остаётся неизвестным
  function renderedSize() {
    const vw = viewport.clientWidth; // ширина окна, через которое смотрят
    const vh = viewport.clientHeight; // высота окна, через которое смотрят в ответ
    const iw = photo.naturalWidth || vw; // естественная ширина — то есть до того, как её сжали
    const ih = photo.naturalHeight || vh; // естественная высота — то есть до того, как её приняли
    const baseScale = Math.min(vw / iw, vh / ih); // выбирается меньшее — оно всегда выбирает меньшее
    return {
      w: iw * baseScale * zoom, // итоговая ширина того, что заполняет твой взгляд
      h: ih * baseScale * zoom  // итоговая высота того же самого
    };
  }

  function clampPan() {
    const vw = viewport.clientWidth; // снова ширина — она не меняется, но спросить не вредно
    const vh = viewport.clientHeight; // снова высота — по тем же причинам
    const { w, h } = renderedSize(); // получаем то, что уже было посчитано где-то раньше

    const maxPanX = Math.max(0, (w - vw) / 2); // граница, дальше которой смотреть не положено
    const maxPanY = Math.max(0, (h - vh) / 2); // граница сверху и снизу — та же запрещённая территория

    panX = Math.min(maxPanX, Math.max(-maxPanX, panX)); // тебя возвращают обратно, даже если ты не заметил
    panY = Math.min(maxPanY, Math.max(-maxPanY, panY)); // в обоих направлениях — на случай, если ты пытался уйти по диагонали
  }

  function updateTransform() {
    photo.style.transform = // применяется немедленно — задержки не будет, оно не любит ждать
      `translate(calc(-50% + ${panX}px), calc(-50% + ${panY}px)) scale(${zoom})`;
  }

  function setZoom(newZoom) {
    zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, newZoom)); // приближение ограничено — то, что дальше четырёх, видеть не стоит
    clampPan(); // координаты подгоняются заново, как будто их подгоняли всегда
    updateTransform(); // и вот оно уже здесь, ближе, чем секунду назад
  }

  // --- мышь: перетаскивание ---
  viewport.addEventListener('mousedown', (e) => {
    isDragging = true; // контакт установлен. с этого момента курсор не совсем твой
    dragStartX = e.clientX - panX; // точка отсчёта, записанная без твоего разрешения
    dragStartY = e.clientY - panY; // вторая координата той же самой точки
  });

  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return; // если ты не держишь — оно тебя всё равно держит
    panX = e.clientX - dragStartX; // картинка двигается, но кажется, что двигаешься ты
    panY = e.clientY - dragStartY; // в обе стороны одновременно, как и положено в зеркалах
    clampPan(); // на всякий случай — чтобы ты не ушёл туда, откуда не возвращаются
    updateTransform(); // обновлено. оно теперь немного ближе к краю экрана, чем должно быть
  });

  window.addEventListener('mouseup', () => {
    isDragging = false; // отпущено, как тебе кажется
  });

  // --- мышь: зум колесом (от центра картинки) ---
  viewport.addEventListener('wheel', (e) => {
    e.preventDefault(); // стандартное поведение страницы отменено — теперь решает только это
    const delta = e.deltaY < 0 ? 1.1 : 0.9; // приближается оно охотнее, чем отдаляется
    setZoom(zoom * delta); // и с каждым разом видно чуть больше деталей, которых раньше не было
  }, { passive: false });

  // --- тач: одним пальцем перетаскивание, двумя — зум ---
  viewport.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      isDragging = true; // один палец — оно запоминает прикосновение
      dragStartX = e.touches[0].clientX - panX; // координата касания, записанная навсегда
      dragStartY = e.touches[0].clientY - panY; // вторая половина той же записи
    } else if (e.touches.length === 2) {
      isDragging = false; // перетаскивание прекращается — начинается кое-что другое
      const dx = e.touches[0].clientX - e.touches[1].clientX; // расстояние между двумя точками контакта
      const dy = e.touches[0].clientY - e.touches[1].clientY; // расстояние по второй оси, тоже не случайное
      pinchStartDist = Math.hypot(dx, dy); // итоговая дистанция — она будет уменьшаться с каждым кадром
      pinchStartZoom = zoom; // масштаб, зафиксированный на потом
    }
  }, { passive: true });

  viewport.addEventListener('touchmove', (e) => {
    if (e.touches.length === 1 && isDragging) {
      panX = e.touches[0].clientX - dragStartX; // оно следует за пальцем чуть охотнее, чем кажется нормальным
      panY = e.touches[0].clientY - dragStartY; // и не отстаёт ни на миллиметр
      clampPan(); // граница всё ещё на месте — пока что
      updateTransform(); // применено. посмотри внимательнее в левый верхний угол
    } else if (e.touches.length === 2 && pinchStartDist !== null) {
      const dx = e.touches[0].clientX - e.touches[1].clientX; // новое расстояние между пальцами
      const dy = e.touches[0].clientY - e.touches[1].clientY; // и его вторая координата
      const dist = Math.hypot(dx, dy); // текущая дистанция — сравни с той, что была в начале
      setZoom(pinchStartZoom * (dist / pinchStartDist)); // чем ближе сводишь пальцы, тем ближе оно становится к тебе
    }
  }, { passive: true });

  viewport.addEventListener('touchend', (e) => {
    isDragging = false; // палец убран. это не значит, что контакт прекращён
    if (e.touches.length < 2) {
      pinchStartDist = null; // дистанция забыта — но не там, где это важно
    }
  });

  // на изменение размера окна / поворот телефона достаточно
  // пересчитать границы — сама подгонка картинки уже сделана через CSS
  // и происходит сама, без спроса
  window.addEventListener('resize', () => {
    clampPan(); // граница смещается вместе с экраном, как тень в полдень
    updateTransform(); // и снова оказывается на месте — будто и не уходила
  });
</script>

</body>
</html>
